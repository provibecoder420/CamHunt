<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CamHunt - Used Camera Search</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --bg-card: #1a1d27;
      --bg-card-hover: #222632;
      --bg-input: #1a1d27;
      --border: #2a2e3a;
      --text: #e4e6ed;
      --text-muted: #8b8fa3;
      --text-dim: #5c6070;
      --accent: #6c5ce7;
      --accent-hover: #7c6ef7;
      --accent-glow: rgba(108, 92, 231, 0.15);
      --green: #00b894;
      --orange: #fdcb6e;
      --red: #e17055;
      --blue: #74b9ff;
      --tag-bg: rgba(108, 92, 231, 0.12);
      --tag-text: #a29bfe;
      --radius: 12px;
      --radius-sm: 8px;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }

    /* Header */
    header {
      background: linear-gradient(180deg, rgba(108,92,231,0.08) 0%, transparent 100%);
      border-bottom: 1px solid var(--border);
      padding: 1.5rem 2rem;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    .header-inner {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .logo svg { width: 32px; height: 32px; }

    .logo span {
      background: linear-gradient(135deg, #a29bfe, #6c5ce7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header-stats {
      display: flex;
      gap: 1.5rem;
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .header-stats strong { color: var(--text); font-weight: 600; }

    /* Main Layout */
    .app {
      max-width: 1400px;
      margin: 0 auto;
      padding: 1.5rem 2rem;
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 1.5rem;
    }

    /* Sidebar Filters */
    .filters {
      position: sticky;
      top: 90px;
      height: fit-content;
      max-height: calc(100vh - 110px);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .filter-group {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.2rem;
    }

    .filter-group h3 {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
    }

    .filter-group label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.3rem 0;
      font-size: 0.85rem;
      cursor: pointer;
      color: var(--text);
      transition: color 0.15s;
    }

    .filter-group label:hover { color: var(--accent-hover); }

    .filter-group input[type="checkbox"] {
      appearance: none;
      width: 16px;
      height: 16px;
      border: 2px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.15s;
      flex-shrink: 0;
    }

    .filter-group input[type="checkbox"]:checked {
      background: var(--accent);
      border-color: var(--accent);
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 16 16' fill='white' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M12.207 4.793a1 1 0 010 1.414l-5 5a1 1 0 01-1.414 0l-2.5-2.5a1 1 0 011.414-1.414L6.5 9.086l4.293-4.293a1 1 0 011.414 0z'/%3E%3C/svg%3E");
    }

    .count {
      margin-left: auto;
      font-size: 0.75rem;
      color: var(--text-dim);
      font-weight: 500;
    }

    /* Price Range */
    .price-inputs {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    .price-inputs input {
      width: 100%;
      padding: 0.5rem 0.6rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: inherit;
      font-size: 0.85rem;
      outline: none;
      transition: border-color 0.15s;
    }

    .price-inputs input:focus { border-color: var(--accent); }
    .price-inputs span { color: var(--text-dim); font-size: 0.8rem; }

    /* Search Bar */
    .search-area {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .search-bar-wrap {
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }

    .search-bar {
      flex: 1;
      position: relative;
    }

    .search-bar svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      color: var(--text-muted);
    }

    .search-bar input {
      width: 100%;
      padding: 0.75rem 1rem 0.75rem 2.8rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .search-bar input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .search-bar input::placeholder { color: var(--text-dim); }

    .sort-select {
      padding: 0.75rem 1rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: inherit;
      font-size: 0.85rem;
      outline: none;
      cursor: pointer;
      min-width: 160px;
    }

    .sort-select:focus { border-color: var(--accent); }

    /* Active Filters */
    .active-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }

    .active-filter-tag {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.25rem 0.6rem;
      background: var(--tag-bg);
      color: var(--tag-text);
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 500;
    }

    .active-filter-tag button {
      background: none;
      border: none;
      color: inherit;
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      opacity: 0.6;
      transition: opacity 0.15s;
    }

    .active-filter-tag button:hover { opacity: 1; }

    .clear-all {
      background: none;
      border: none;
      color: var(--red);
      cursor: pointer;
      font-size: 0.75rem;
      font-weight: 500;
      padding: 0.25rem 0.4rem;
    }

    /* Results Grid */
    .results-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
    }

    .results-count {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .results-count strong { color: var(--text); }

    .view-toggle {
      display: flex;
      gap: 0.25rem;
      background: var(--bg-card);
      border-radius: var(--radius-sm);
      padding: 3px;
      border: 1px solid var(--border);
    }

    .view-toggle button {
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      padding: 0.35rem 0.5rem;
      border-radius: 6px;
      transition: all 0.15s;
      display: flex;
      align-items: center;
    }

    .view-toggle button.active {
      background: var(--accent);
      color: white;
    }

    .view-toggle button svg { width: 16px; height: 16px; }

    .results-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
    }

    .results-grid.list-view {
      grid-template-columns: 1fr;
    }

    /* Camera Card */
    .camera-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .camera-card:hover {
      transform: translateY(-2px);
      border-color: var(--accent);
      box-shadow: 0 8px 30px rgba(0,0,0,0.3), 0 0 0 1px var(--accent-glow);
    }

    .card-image {
      width: 100%;
      aspect-ratio: 4/3;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .card-image .camera-icon {
      width: 64px;
      height: 64px;
      color: var(--border);
    }

    .card-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .source-badge {
      position: absolute;
      top: 8px;
      left: 8px;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      padding: 0.2rem 0.5rem;
      border-radius: 6px;
      font-size: 0.7rem;
      font-weight: 600;
      color: white;
    }

    .condition-badge {
      position: absolute;
      top: 8px;
      right: 8px;
      padding: 0.2rem 0.5rem;
      border-radius: 6px;
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .condition-badge.excellent { background: rgba(0,184,148,0.2); color: var(--green); }
    .condition-badge.good { background: rgba(116,185,255,0.2); color: var(--blue); }
    .condition-badge.fair { background: rgba(253,203,110,0.2); color: var(--orange); }
    .condition-badge.poor { background: rgba(225,112,85,0.2); color: var(--red); }

    .card-body {
      padding: 1rem 1.1rem;
    }

    .card-brand {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--accent);
      margin-bottom: 0.2rem;
    }

    .card-title {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 0.4rem;
      line-height: 1.3;
    }

    .card-specs {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      margin-bottom: 0.7rem;
    }

    .spec-tag {
      font-size: 0.7rem;
      padding: 0.15rem 0.45rem;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text-muted);
      font-weight: 500;
    }

    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }

    .card-price {
      font-size: 1.3rem;
      font-weight: 800;
      color: var(--green);
    }

    .card-source {
      font-size: 0.72rem;
      color: var(--text-dim);
      text-align: right;
    }

    .card-source .site { color: var(--text-muted); font-weight: 500; }

    /* List view card */
    .list-view .camera-card {
      display: grid;
      grid-template-columns: 200px 1fr;
    }

    .list-view .card-image { aspect-ratio: unset; height: 100%; min-height: 140px; }

    /* No results */
    .no-results {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-muted);
    }

    .no-results svg { width: 64px; height: 64px; color: var(--border); margin-bottom: 1rem; }
    .no-results h3 { font-size: 1.1rem; color: var(--text); margin-bottom: 0.5rem; }

    /* Loading skeleton */
    .skeleton-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .skeleton-img {
      width: 100%;
      aspect-ratio: 4/3;
      background: linear-gradient(90deg, var(--bg) 25%, var(--bg-card-hover) 50%, var(--bg) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }

    .skeleton-body { padding: 1rem; }
    .skeleton-line {
      height: 12px;
      border-radius: 6px;
      background: linear-gradient(90deg, var(--bg) 25%, var(--bg-card-hover) 50%, var(--bg) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      margin-bottom: 0.5rem;
    }

    .skeleton-line:nth-child(2) { width: 60%; }
    .skeleton-line:nth-child(3) { width: 40%; }

    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    /* Responsive */
    @media (max-width: 900px) {
      .app { grid-template-columns: 1fr; padding: 1rem; }
      .filters {
        position: static;
        max-height: none;
        display: none;
      }
      .filters.open { display: flex; }
      .mobile-filter-btn { display: flex !important; }
    }

    @media (max-width: 600px) {
      header { padding: 1rem; }
      .results-grid { grid-template-columns: 1fr; }
      .header-stats { display: none; }
    }

    .mobile-filter-btn {
      display: none;
      align-items: center;
      gap: 0.4rem;
      padding: 0.6rem 1rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
    }

    .mobile-filter-btn svg { width: 16px; height: 16px; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

    .reset-btn {
      width: 100%;
      padding: 0.6rem;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-muted);
      font-family: inherit;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }

    .reset-btn:hover {
      border-color: var(--red);
      color: var(--red);
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <svg viewBox="0 0 32 32" fill="none"><rect x="3" y="8" width="26" height="18" rx="3" stroke="currentColor" stroke-width="2" fill="none" style="color:var(--accent)"/><circle cx="16" cy="17" r="5" stroke="currentColor" stroke-width="2" fill="none" style="color:var(--accent)"/><rect x="11" y="5" width="10" height="4" rx="1.5" stroke="currentColor" stroke-width="1.5" fill="none" style="color:var(--text-dim)"/></svg>
      <span>CamHunt</span>
    </div>
    <div class="header-stats">
      <div>Searching <strong id="siteCount">8</strong> trusted sites</div>
      <div><strong id="totalListings">0</strong> listings found</div>
    </div>
  </div>
</header>

<div class="app">
  <!-- Sidebar Filters -->
  <aside class="filters" id="filtersPanel">

    <div class="filter-group">
      <h3>Brand</h3>
      <div id="brandFilters"></div>
    </div>

    <div class="filter-group">
      <h3>Camera Type</h3>
      <div id="typeFilters"></div>
    </div>

    <div class="filter-group">
      <h3>Sensor Size</h3>
      <div id="sensorFilters"></div>
    </div>

    <div class="filter-group">
      <h3>Condition</h3>
      <div id="conditionFilters"></div>
    </div>

    <div class="filter-group">
      <h3>Price Range</h3>
      <div class="price-inputs">
        <input type="number" id="priceMin" placeholder="Min $" min="0">
        <span>&ndash;</span>
        <input type="number" id="priceMax" placeholder="Max $" min="0">
      </div>
    </div>

    <div class="filter-group">
      <h3>Source</h3>
      <div id="sourceFilters"></div>
    </div>

    <button class="reset-btn" onclick="resetFilters()">Reset All Filters</button>
  </aside>

  <!-- Main Content -->
  <main class="search-area">
    <div class="search-bar-wrap">
      <button class="mobile-filter-btn" onclick="toggleFilters()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="20" y2="12"/><line x1="12" y1="18" x2="20" y2="18"/><circle cx="6" cy="12" r="2" fill="currentColor"/><circle cx="10" cy="18" r="2" fill="currentColor"/></svg>
        Filters
      </button>
      <div class="search-bar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchInput" placeholder="Search cameras... e.g. 'Sony A7III' or 'Canon R5'">
      </div>
      <select class="sort-select" id="sortSelect">
        <option value="relevance">Sort: Relevance</option>
        <option value="price-asc">Price: Low to High</option>
        <option value="price-desc">Price: High to Low</option>
        <option value="newest">Newest First</option>
        <option value="condition">Best Condition</option>
      </select>
    </div>

    <div class="active-filters" id="activeFilters"></div>

    <div class="results-header">
      <div class="results-count" id="resultsCount"></div>
      <div class="view-toggle">
        <button class="active" id="gridViewBtn" onclick="setView('grid')" title="Grid view">
          <svg viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
        </button>
        <button id="listViewBtn" onclick="setView('list')" title="List view">
          <svg viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="4" width="18" height="4" rx="1.5"/><rect x="3" y="10" width="18" height="4" rx="1.5"/><rect x="3" y="16" width="18" height="4" rx="1.5"/></svg>
        </button>
      </div>
    </div>

    <div class="results-grid" id="resultsGrid"></div>
  </main>
</div>

function generateListings() {
  const listings = [];
  let id = 1;
  const conditionWeights = { Excellent: 1.0, Good: 0.85, Fair: 0.7, Poor: 0.55 };
  const now = Date.now();

  for (const [brand, models] of Object.entries(CAMERA_MODELS)) {
    for (const model of models) {
      // Generate 2-5 listings per model from different sources
      const numListings = 2 + Math.floor(Math.random() * 4);
      const shuffledSources = [...SOURCES].sort(() => Math.random() - 0.5);

      for (let i = 0; i < numListings; i++) {
        const source = shuffledSources[i % SOURCES.length];
        const condition = CONDITIONS[Math.floor(Math.random() * CONDITIONS.length)];
        const multiplier = conditionWeights[condition];
        const [lo, hi] = model.priceRange;
        const basePrice = lo + Math.random() * (hi - lo);
        const price = Math.round(basePrice * multiplier / 5) * 5;
        const shutterCount = model.type === 'Film' ? null : Math.floor(Math.random() * 150000);
        const daysAgo = Math.floor(Math.random() * 60);
        const posted = new Date(now - daysAgo * 86400000);

        listings.push({
          id: id++,
          brand,
          model: model.name,
          fullName: `${brand} ${model.name}`,
          type: model.type,
          sensor: model.sensor,
          megapixels: model.mp,
          condition,
          price,
          source: source.id,
          sourceName: source.name,
          sourceUrl: source.url,
          shutterCount,
          posted,
          daysAgo,
          bodyOnly: Math.random() > 0.4,
        });
      }
    }
  }
  return listings;
}

const allListings = generateListings();
document.getElementById('totalListings').textContent = allListings.length;

// ── State ──
let state = {
  search: '',
  brands: new Set(),
  types: new Set(),
  sensors: new Set(),
  conditions: new Set(),
  sources: new Set(),
  priceMin: null,
  priceMax: null,
  sort: 'relevance',
  view: 'grid',
};

// ── Build Filter Checkboxes ──
function buildFilterGroup(containerId, items, stateKey) {
  const container = document.getElementById(containerId);
  container.innerHTML = items.map(item => {
    const count = allListings.filter(l => {
      if (stateKey === 'brands') return l.brand === item;
      if (stateKey === 'types') return l.type === item;
      if (stateKey === 'sensors') return l.sensor === item;
      if (stateKey === 'conditions') return l.condition === item;
      if (stateKey === 'sources') return l.sourceName === item;
      return false;
    }).length;
    return `<label>
      <input type="checkbox" data-key="${stateKey}" data-value="${item}">
      ${item} <span class="count">${count}</span>
    </label>`;
  }).join('');

  container.querySelectorAll('input').forEach(cb => {
    cb.addEventListener('change', () => {
      const { key, value } = cb.dataset;
      if (cb.checked) state[key].add(value);
      else state[key].delete(value);
      render();
    });
  });
}

const sourceNames = SOURCES.map(s => s.name);
buildFilterGroup('brandFilters', BRANDS, 'brands');
buildFilterGroup('typeFilters', TYPES, 'types');
buildFilterGroup('sensorFilters', SENSORS, 'sensors');
buildFilterGroup('conditionFilters', CONDITIONS, 'conditions');
buildFilterGroup('sourceFilters', sourceNames, 'sources');

// ── Event Listeners ──
let debounceTimer;
document.getElementById('searchInput').addEventListener('input', (e) => {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => { state.search = e.target.value; render(); }, 200);
});

document.getElementById('sortSelect').addEventListener('change', (e) => {
  state.sort = e.target.value;
  render();
});

document.getElementById('priceMin').addEventListener('input', (e) => {
  state.priceMin = e.target.value ? Number(e.target.value) : null;
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(render, 300);
});

document.getElementById('priceMax').addEventListener('input', (e) => {
  state.priceMax = e.target.value ? Number(e.target.value) : null;
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(render, 300);
});

// ── Filter & Sort ──
function getFiltered() {
  let results = [...allListings];

  if (state.search) {
    const q = state.search.toLowerCase();
    results = results.filter(l =>
      l.fullName.toLowerCase().includes(q) ||
      l.brand.toLowerCase().includes(q) ||
      l.model.toLowerCase().includes(q) ||
      l.type.toLowerCase().includes(q) ||
      l.sensor.toLowerCase().includes(q)
    );
  }

  if (state.brands.size) results = results.filter(l => state.brands.has(l.brand));
  if (state.types.size) results = results.filter(l => state.types.has(l.type));
  if (state.sensors.size) results = results.filter(l => state.sensors.has(l.sensor));
  if (state.conditions.size) results = results.filter(l => state.conditions.has(l.condition));
  if (state.sources.size) results = results.filter(l => state.sources.has(l.sourceName));
  if (state.priceMin !== null) results = results.filter(l => l.price >= state.priceMin);
  if (state.priceMax !== null) results = results.filter(l => l.price <= state.priceMax);

  const condOrder = { Excellent: 0, Good: 1, Fair: 2, Poor: 3 };
  switch (state.sort) {
    case 'price-asc': results.sort((a, b) => a.price - b.price); break;
    case 'price-desc': results.sort((a, b) => b.price - a.price); break;
    case 'newest': results.sort((a, b) => a.daysAgo - b.daysAgo); break;
    case 'condition': results.sort((a, b) => condOrder[a.condition] - condOrder[b.condition]); break;
  }

  return results;
}

// ── Render ──
function render() {
  const filtered = getFiltered();
  const grid = document.getElementById('resultsGrid');
  const countEl = document.getElementById('resultsCount');

  countEl.innerHTML = `Showing <strong>${filtered.length}</strong> of ${allListings.length} listings`;

  renderActiveFilters();

  if (filtered.length === 0) {
    grid.innerHTML = `
      <div class="no-results" style="grid-column: 1/-1;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
        <h3>No cameras found</h3>
        <p>Try adjusting your filters or search terms</p>
      </div>`;
    return;
  }

  grid.innerHTML = filtered.map(l => {
    const condClass = l.condition.toLowerCase();
    const specs = [];
    if (l.megapixels) specs.push(`${l.megapixels}MP`);
    specs.push(l.sensor);
    specs.push(l.type);
    if (l.shutterCount !== null) specs.push(`${(l.shutterCount/1000).toFixed(0)}k actuations`);
    if (l.bodyOnly) specs.push('Body Only');

    const timeAgo = l.daysAgo === 0 ? 'Today' : l.daysAgo === 1 ? 'Yesterday' : `${l.daysAgo}d ago`;

    return `
      <a class="camera-card" href="${l.sourceUrl}" target="_blank" rel="noopener noreferrer">
        <div class="card-image">
          <svg class="camera-icon" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="6" y="16" width="52" height="36" rx="6"/>
            <circle cx="32" cy="34" r="10"/>
            <circle cx="32" cy="34" r="5"/>
            <rect x="22" y="10" width="20" height="8" rx="3"/>
          </svg>
          <div class="source-badge">${l.sourceName}</div>
          <div class="condition-badge ${condClass}">${l.condition}</div>
        </div>
        <div class="card-body">
          <div class="card-brand">${l.brand}</div>
          <div class="card-title">${l.model}</div>
          <div class="card-specs">
            ${specs.map(s => `<span class="spec-tag">${s}</span>`).join('')}
          </div>
          <div class="card-footer">
            <div class="card-price">$${l.price.toLocaleString()}</div>
            <div class="card-source">
              <div>${timeAgo}</div>
              <div class="site">${l.sourceName}</div>
            </div>
          </div>
        </div>
      </a>`;
  }).join('');
}

function renderActiveFilters() {
  const container = document.getElementById('activeFilters');
  const tags = [];

  for (const brand of state.brands) tags.push({ label: brand, key: 'brands', value: brand });
  for (const t of state.types) tags.push({ label: t, key: 'types', value: t });
  for (const s of state.sensors) tags.push({ label: s, key: 'sensors', value: s });
  for (const c of state.conditions) tags.push({ label: c, key: 'conditions', value: c });
  for (const s of state.sources) tags.push({ label: s, key: 'sources', value: s });
  if (state.priceMin !== null) tags.push({ label: `Min $${state.priceMin}`, key: 'priceMin' });
  if (state.priceMax !== null) tags.push({ label: `Max $${state.priceMax}`, key: 'priceMax' });

  if (tags.length === 0) { container.innerHTML = ''; return; }

  container.innerHTML = tags.map(t =>
    `<span class="active-filter-tag">${t.label}<button onclick="removeFilter('${t.key}','${t.value || ''}')">&times;</button></span>`
  ).join('') + `<button class="clear-all" onclick="resetFilters()">Clear all</button>`;
}

window.removeFilter = function(key, value) {
  if (key === 'priceMin') { state.priceMin = null; document.getElementById('priceMin').value = ''; }
  else if (key === 'priceMax') { state.priceMax = null; document.getElementById('priceMax').value = ''; }
  else {
    state[key].delete(value);
    const cb = document.querySelector(`input[data-key="${key}"][data-value="${value}"]`);
    if (cb) cb.checked = false;
  }
  render();
};

window.resetFilters = function() {
  state.brands.clear(); state.types.clear(); state.sensors.clear();
  state.conditions.clear(); state.sources.clear();
  state.priceMin = null; state.priceMax = null;
  state.search = '';
  document.getElementById('searchInput').value = '';
  document.getElementById('priceMin').value = '';
  document.getElementById('priceMax').value = '';
  document.querySelectorAll('.filters input[type="checkbox"]').forEach(cb => cb.checked = false);
  render();
};

window.setView = function(view) {
  state.view = view;
  const grid = document.getElementById('resultsGrid');
  grid.classList.toggle('list-view', view === 'list');
  document.getElementById('gridViewBtn').classList.toggle('active', view === 'grid');
  document.getElementById('listViewBtn').classList.toggle('active', view === 'list');
};

window.toggleFilters = function() {
  document.getElementById('filtersPanel').classList.toggle('open');
};

// Initial render
render();
</script>
